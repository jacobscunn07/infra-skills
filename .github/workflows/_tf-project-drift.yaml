name: Terraform Project Drift Detection

# Reusable workflow — called once per project by tf-drift.yaml.
# Runs drift detection for each workspace in the project.  Intended for
# scheduled and on-demand use, so no PR comment permissions are requested.
on:
  workflow_call:
    inputs:
      project:
        description: Terraform project directory to check for drift.
        type: string
        required: true
      workspaces:
        description: JSON array of workspace names to check (e.g. '["dev","prod"]').
        type: string
        required: true
      aws_credentials:
        description: >
          JSON object mapping each workspace name to a boolean — whether to run
          the AWS credentials step for that workspace (e.g. '{"dev":true,"prod":false}').
        type: string
        required: false
        default: '{}'

# Least-privilege defaults — jobs elevate only what they need.
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # One drift check per workspace.  Uses dflook/terraform-check — purpose-built
  # for drift detection.  It fails the step when changes are present and sets
  # failure-reason: changes-to-apply.  continue-on-error: true lets the job
  # survive drift so the outer workflow can report all affected workspaces.
  # A separate step re-fails the job for genuine Terraform errors.
  #
  # Two artifact types are uploaded per drifted workspace:
  #   drift__<project>__<workspace>  — metadata consumed by tf-drift.yaml report
  #   drift-result-<project>-<ws>   — full status consumed by the summarize job
  # ─────────────────────────────────────────────────────────────────────────────
  detect-drift:
    name: "${{ matrix.workspace }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write  # Required for OIDC → AWS
      contents: read
      actions: read    # Required to resolve per-job URLs for the summary table

    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(inputs.workspaces) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials (OIDC)
        if: fromJSON(inputs.aws_credentials)[matrix.workspace]
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          mask-aws-account-id: 'true'

      - name: Terraform Check
        id: check
        uses: dflook/terraform-check@8abe57e9caec11de4046a8e9bcc74bb467e33478  # v2.2.3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: ${{ inputs.project }}
          workspace: ${{ matrix.workspace }}
          var_file: ${{ inputs.project }}/environments/${{ matrix.workspace }}/terraform.tfvars

      - name: Fail on Terraform error
        if: steps.check.outcome == 'failure' && steps.check.outputs.failure-reason != 'changes-to-apply'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        env:
          PROJECT: ${{ inputs.project }}
          WORKSPACE: ${{ matrix.workspace }}
        with:
          script: |
            core.setFailed(`Terraform check failed for ${process.env.PROJECT}/${process.env.WORKSPACE}`);

      - name: Write drift metadata
        if: steps.check.outputs.failure-reason == 'changes-to-apply'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        env:
          PROJECT: ${{ inputs.project }}
          WORKSPACE: ${{ matrix.workspace }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const meta = JSON.stringify({
              project: process.env.PROJECT,
              workspace: process.env.WORKSPACE,
            });
            fs.writeFileSync(path.join(process.env.RUNNER_TEMP, 'drift-meta.json'), meta);

      - name: Upload drift artifact
        if: steps.check.outputs.failure-reason == 'changes-to-apply'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          # Double-underscore separates project from workspace so names with
          # hyphens (e.g. network-spoke) are unambiguous when parsing.
          name: drift__${{ inputs.project }}__${{ matrix.workspace }}
          path: ${{ runner.temp }}/drift-meta.json
          retention-days: 30

      - name: Save drift result
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        env:
          PROJECT:        ${{ inputs.project }}
          WORKSPACE:      ${{ matrix.workspace }}
          CHECK_OUTCOME:  ${{ steps.check.outcome }}
          FAILURE_REASON: ${{ steps.check.outputs.failure-reason }}
        with:
          script: |
            const fs      = require('fs');
            const project = process.env.PROJECT;
            const ws      = process.env.WORKSPACE;

            const resp = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const job = resp.data.jobs.find(
              j => j.name === `${project} / ${ws}` || j.name === ws,
            );

            const result = {
              workspace:      ws,
              status:         process.env.CHECK_OUTCOME,
              failure_reason: process.env.FAILURE_REASON || '',
              job_url:        job?.html_url               ?? '',
              check_run_id:   job?.check_run_url ? Number(job.check_run_url.split('/').pop()) : null,
            };
            fs.mkdirSync('/tmp/drift-results', { recursive: true });
            fs.writeFileSync(
              `/tmp/drift-results/${result.workspace}.json`,
              JSON.stringify(result),
            );

      - name: Upload drift result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: drift-result-${{ inputs.project }}-${{ matrix.workspace }}
          path: /tmp/drift-results/${{ matrix.workspace }}.json
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Collects per-workspace drift results and writes a single summary table.
  # Runs even when detect-drift fails.
  # ─────────────────────────────────────────────────────────────────────────────
  summarize:
    name: Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detect-drift]
    if: always()
    permissions:
      contents: read
      checks: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: ./.github/actions/tf-summarize
        with:
          type: drift
          project: ${{ inputs.project }}
